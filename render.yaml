services:
  - type: web
    name: agatclean
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: DATA_DIR
        value: /var/data
    disk:
      name: agatclean-data
      mountPath: /var/data
      sizeGB: 1
