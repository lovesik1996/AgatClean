<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AgatClean</title>
  <meta name="theme-color" content="#1a73e8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f7faf9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a73e8;
      margin-bottom: 0.4rem;
    }
    p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .offline-msg {
      display: none;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #856404;
      text-align: center;
      max-width: 300px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="12" fill="#1a73e8"/>
    <rect x="14" y="18" width="36" height="7" rx="3" fill="white"/>
    <rect x="14" y="31" width="28" height="7" rx="3" fill="white"/>
    <rect x="14" y="44" width="20" height="7" rx="3" fill="white"/>
  </svg>
  <h1>AgatClean</h1>
  <p>Planer sprzątania domu</p>
  <div class="spinner" id="spinner"></div>
  <div class="offline-msg" id="offlineMsg">
    Brak połączenia z internetem.<br>
    Sprawdź Wi-Fi lub dane mobilne<br>i otwórz aplikację ponownie.
  </div>

  <script type="module">
    import { Capacitor } from 'https://unpkg.com/@capacitor/core@6.2.0/dist/index.js';

    // Gdy serwer odpowie – Capacitor ładuje server.url automatycznie
    // Ta strona pokazuje się tylko gdy serwer jest niedostępny
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (!navigator.onLine) {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('offlineMsg').style.display = 'block';
        }
      }, 3000);
    });
  </script>
</body>
</html>
